{% extends 'car_sales/base.html' %}
{% load humanize %}

{% block content %}
<div class="pagetitle">
  <h1>Admin Control Center</h1>
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item active">Admin Panel</li>
    </ol>
  </nav>
</div>

<section class="section dashboard">
  <div class="row">
    <!-- Models grid -->
    <div class="col-lg-12">
      <div class="row">
        {% for key, val in stats.items %}
        <div class="col-xxl-3 col-xl-4 col-md-6 col-sm-6 mb-4">
          <div class="card h-100 shadow-sm border-0">
            <div class="card-body d-flex flex-column justify-content-between p-4">
              <div>
                <div class="d-flex align-items-center mb-3">
                  <div class="card-icon rounded-circle d-flex align-items-center justify-content-center bg-light-primary text-primary" style="width: 48px; height: 48px; min-width: 48px; background: rgba(65, 84, 241, 0.1);">
                    <i class="bi bi-folder2-open fs-5"></i>
                  </div>
                  <div class="ps-3">
                    <h6 class="mb-0 text-dark font-weight-bold" style="font-size: 1.1rem; line-height: 1.2;">{{ val.name }}</h6>
                  </div>
                </div>
                <div class="my-3">
                  <span class="text-muted small">Total Records:</span>
                  <h4 class="mb-0 text-primary font-weight-bold" style="font-size: 2rem;">{{ val.count|intcomma }}</h4>
                </div>
              </div>
              <div class="pt-3 border-top d-flex justify-content-between">
                <a href="{{ val.url }}" class="btn btn-outline-primary btn-sm px-3"><i class="bi bi-list-task me-1"></i> View List</a>
                <a href="{% url 'admin_crud' val.slug 'create' %}?next={{ request.path }}" class="btn btn-primary btn-sm px-3"><i class="bi bi-plus-circle me-1"></i> Add New</a>
              </div>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
